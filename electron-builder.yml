productName: SC - Next Electron
appId: br.com.electron.next
asar: true

icon: public/icon.png

extraMetadata:
  main: dist/index.js

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

files:
  - dist
  - frontend/out

directories:
  output: out

publish:
  - provider: github

# Windows
win:
  target:
    - nsis
  icon: ./public/icon.png
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
  signtoolOptions:
    publisherName: Saulo INC

# Mac
mac:
  target: dmg
  icon: ./public/icon.png

# Linux
linux:
  target:
    - AppImage
    - deb
  icon: ./public/icon.png
